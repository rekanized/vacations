services:
  app:
    build:
      context: .
    container_name: absenceboard-app
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - .:/app
      - /app/vendor
      - ./database:/app/database
      - ./storage:/app/storage

  nginx:
    image: nginx:1.27-alpine
    container_name: absenceboard-nginx
    depends_on:
      - app
    ports:
      - "8000:80"
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro