services:
  app:
    build:
      context: .
    container_name: leaveboard-app
    restart: unless-stopped
    expose:
      - "9000"

  nginx:
    image: nginx:1.27-alpine
    container_name: leaveboard-nginx
    depends_on:
      - app
    ports:
      - "8000:80"
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro